<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lotto Number Generator</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>Lotto Number Generator</h1>
        <div class="controls">
            <button id="draw">Draw Numbers</button>
            <button id="theme-toggle">Dark Mode</button>
        </div>
        <div id="numbers"></div>
        <hr>
        <section class="inquiry-section">
            <h2>Affiliate Inquiry</h2>
            <form action="https://formspree.io/f/placeholder" method="POST" id="inquiry-form">
                <div class="form-group">
                    <label for="email">Email Address</label>
                    <input type="email" name="email" id="email" placeholder="example@email.com" required>
                </div>
                <div class="form-group">
                    <label for="message">Message</label>
                    <textarea name="message" id="message" rows="4" placeholder="Your inquiry details..." required></textarea>
                </div>
                <button type="submit">Send Inquiry</button>
            </form>
        </section>
    </div>
    <script src="main.js"></script>
</body>
</html>
